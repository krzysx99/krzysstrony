<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 FREE ZASOBY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #0a1a2e 50%, #0a1530 100%);
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .gradient-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }

        .circle-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            top: -150px;
            left: -100px;
        }

        .circle-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(45deg, #00d4ff, #0099ff);
            bottom: -100px;
            right: -100px;
            animation-delay: -3.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.15); }
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            padding: 15px 30px;
            background: linear-gradient(135deg, rgba(0, 198, 255, 0.3) 0%, rgba(0, 114, 255, 0.2) 100%);
            border: 1px solid rgba(0, 198, 255, 0.4);
            border-radius: 15px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            box-shadow: 0 10px 30px rgba(0, 198, 255, 0.4);
            background: linear-gradient(135deg, rgba(0, 198, 255, 0.5) 0%, rgba(0, 114, 255, 0.4) 100%);
        }

        header {
            text-align: center;
            margin: 60px 0 50px;
        }

        .main-icon {
            font-size: 100px;
            margin-bottom: 25px;
            display: block;
            animation: iconBounce 2s ease-in-out infinite;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-22px) rotate(4deg); }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 50%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 50px rgba(0, 198, 255, 0.4);
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.5);
            font-weight: 300;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 900px;
            width: 100%;
            padding: 20px;
        }

        .tool-card {
            position: relative;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(0, 198, 255, 0.3);
            border-radius: 22px;
            padding: 35px 25px;
            text-decoration: none;
            color: white;
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #00c6ff, #0072ff, #00d4ff);
        }

        .tool-card::after {
            content: '';
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(0, 198, 255, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.4),
                0 0 40px rgba(0, 198, 255, 0.3);
            border-color: rgba(0, 212, 255, 0.6);
        }

        .tool-card:hover::after {
            opacity: 1;
        }

        .tool-icon {
            font-size: 55px;
            margin-bottom: 20px;
            display: block;
        }

        .tool-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #00c6ff;
        }

        .tool-desc {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .tool-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(0, 198, 255, 0.4) 0%, rgba(0, 114, 255, 0.3) 100%);
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tool-card:hover .tool-link {
            background: linear-gradient(135deg, rgba(0, 198, 255, 0.6) 0%, rgba(0, 114, 255, 0.5) 100%);
            transform: scale(1.02);
        }

        .arrow-icon {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .tool-card:hover .arrow-icon {
            transform: translateX(8px);
        }

        footer {
            margin-top: 60px;
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            
            .main-icon {
                font-size: 70px;
            }
            
            .back-btn {
                top: 20px;
                left: 20px;
                padding: 12px 22px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animated">
        <div class="gradient-circle circle-1"></div>
        <div class="gradient-circle circle-2"></div>
    </div>
    <div class="grid-overlay"></div>

    <a href="index.html" class="back-btn">← Powrót do Menu</a>

    <div class="container">
        <header>
            <span class="main-icon">💎</span>
            <h1>FREE ZASOBY</h1>
            <p class="subtitle">Wszystko za darmo!</p>
        </header>

        <div class="tools-grid">
            <a href="https://g-meh.com/library/windows" target="_blank" class="tool-card">
                <span class="tool-icon">🎵</span>
                <h3 class="tool-title">Muzyka</h3>
                <p class="tool-desc">Biblioteka darmowej muzyki i dźwięków do Twoich projektów!</p>
                <div class="tool-link">
                    <span>Odwiedź stronę</span>
                    <span class="arrow-icon">➜</span>
                </div>
            </a>

            <a href="https://winiso.pl" target="_blank" class="tool-card">
                <span class="tool-icon">💿</span>
                <h3 class="tool-title">System</h3>
                <p class="tool-desc">Obrazy systemów Windows i narzędzia do instalacji!</p>
                <div class="tool-link">
                    <span>Odwiedź stronę</span>
                    <span class="arrow-icon">➜</span>
                </div>
            </a>
        </div>

        <footer>
            <p>💎 Made by KRZYSX99</p>
        </footer>
    </div>
</body>
</html>
